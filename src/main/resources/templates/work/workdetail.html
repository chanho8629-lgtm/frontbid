<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Detail</title>
    <link rel="stylesheet" href="../../static/css/work/workdetail.css" th:href="@{/css/work/workdetail.css}">
</head>
<body>
    <main class="page-stack" id="page-stack"></main>

    <template id="work-page-template">
        <section class="page">
            <section class="view">
                <section class="info">
                    <section class="channel-box">
                        <div class="channel">
                            <span class="avatar" data-field="avatarText"></span>
                            <strong class="name" data-field="channel"></strong>
                            <button class="sub" type="button" data-field="subscribe"></button>
                        </div>
                    </section>

                    <section class="left-meta">
                        <p class="desc" data-field="desc"></p>
                        <h2 class="headline" data-field="headline"></h2>
                    </section>
                </section>

                <section class="media">
                    <article class="card">
                        <div class="thumb">
                            <div class="thumb-controls" aria-label="플레이어 컨트롤">
                                <div class="thumb-controls-group thumb-controls-group-left">
                                    <button class="thumb-control-button thumb-control-button-dark" type="button" aria-label="재생" data-role="play-toggle">
                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                            <path data-role="play-toggle-path" d="M7 5.2v13.6c0 .73.8 1.18 1.43.8L19.98 13a.92.92 0 0 0 0-1.6L8.43 4.4A.92.92 0 0 0 7 5.2Z"></path>
                                        </svg>
                                    </button>
                                    <button class="thumb-control-button thumb-control-button-dark" type="button" aria-label="음소거">
                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                            <path d="M11.485 2.143 3.913 6.687A6 6 0 001 11.832v.338a6 6 0 002.913 5.144l7.572 4.543A1 1 0 0013 21V3a1.001 1.001 0 00-1.515-.857Zm6.88 2.079a1 1 0 00-.001 1.414 9 9 0 010 12.728 1 1 0 001.414 1.414 11 11 0 000-15.556 1 1 0 00-1.413 0Zm-2.83 2.828a1 1 0 000 1.415 5 5 0 010 7.07 1 1 0 001.415 1.415 6.999 6.999 0 000-9.9 1 1 0 00-1.415 0Z"></path>
                                        </svg>
                                    </button>
                                </div>
                                <div class="thumb-controls-group thumb-controls-group-right">
                                    <button class="thumb-control-button thumb-control-button-bookmark" type="button" aria-label="찜하기">
                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                            <path d="M19 2H5a2 2 0 00-2 2v16.887c0 1.266 1.382 2.048 2.469 1.399L12 18.366l6.531 3.919c1.087.652 2.469-.131 2.469-1.397V4a2 2 0 00-2-2ZM5 20.233V4h14v16.233l-6.485-3.89-.515-.309-.515.309L5 20.233Z"></path>
                                        </svg>
                                    </button>
                                    <button class="thumb-control-button" type="button" aria-label="추가 작업" data-role="more-button" aria-expanded="false">
                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                            <path d="M12 4a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Zm0 6a2 2 0 100 4 2 2 0 000-4Z"></path>
                                        </svg>
                                    </button>
                                    <button class="thumb-control-button" type="button" aria-label="전체 화면">
                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                            <path d="M10 3H3v7c0 .265.105.52.293.707.187.188.442.293.707.293.265 0 .52-.105.707-.293C4.895 10.52 5 10.265 5 10V6.414l4.293 4.293.076.068c.192.155.435.233.68.22.247-.014.48-.118.654-.292.174-.174.278-.407.291-.653.014-.246-.064-.489-.219-.681l-.068-.076L6.414 5H10c.265 0 .52-.105.707-.293C10.895 4.52 11 4.265 11 4c0-.265-.105-.52-.293-.707C10.52 3.105 10.265 3 10 3Zm10 10c-.265 0-.52.105-.707.293-.188.187-.293.442-.293.707v3.586l-4.293-4.293-.076-.068c-.192-.155-.435-.233-.68-.22-.247.014-.48.118-.654.292-.174.174-.278.407-.291.653-.014.246.064.489.219.681l.068.076L17.586 19H14c-.265 0-.52.105-.707.293-.188.187-.293.442-.293.707 0 .265.105.52.293.707.187.188.442.293.707.293h7v-7c0-.265-.105-.52-.293-.707C20.52 13.105 20.265 13 20 13Z"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <img data-field="thumb" src="" alt="">
                            <p class="caption" data-field="caption"></p>
                        </div>
                        <div class="thumb-more-menu" hidden data-role="more-menu">
                            <button class="thumb-more-menu-item" type="button">
                                <span class="thumb-more-menu-icon">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M4 5a1 1 0 000 2h16a1 1 0 100-2H4Zm-1 5a1 1 0 001 1h10a1 1 0 000-2H4a1 1 0 00-1 1Zm1 3a1 1 0 000 2h16a1 1 0 000-2H4Zm0 4a1 1 0 000 2h10a1 1 0 000-2H4Z"></path>

                                </span>

                            <button class="thumb-more-menu-item" type="button">
                                <span class="thumb-more-menu-icon">

                                    </svg>
                                </span>
                                <span>채널 추천 안함</span>
                            </button>
                            <button class="thumb-more-menu-item" type="button">
                                <span class="thumb-more-menu-icon">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="m4 2.999-.146.073A1.55 1.55 0 003 4.454v16.545a1 1 0 102 0v-6.491a7.26 7.26 0 016.248.115l.752.376a8.94 8.94 0 008 0l.145-.073c.524-.262.855-.797.855-1.382V4.458a1.21 1.21 0 00-1.752-1.083 7.26 7.26 0 01-6.496 0L12 2.999a8.94 8.94 0 00-8 0Zm7.105 1.79v-.002l.752.376A9.26 9.26 0 0019 5.641v7.62a6.95 6.95 0 01-6.105-.052l-.752-.376A9.261 9.261 0 005 12.355v-7.62a6.94 6.94 0 016.105.054Z"></path>
                                    </svg>
                                </span>
                                <span>신고</span>
                            </button>
                        </div>
                    </article>
                </section>

                <aside class="actions" aria-label="동영상 액션">
                    <button class="action" type="button" data-action-label>
                        <span class="bubble">
                            <svg viewBox="0 0 24 24" aria-hidden="true">

                            </svg>
                        </span>
                        <span data-field="likeCount"></span>
                    </button>
                    <button class="action" type="button" data-action-label>
                        <span class="bubble">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="m11.31 2 .392.007c1.824.06 3.61.534 5.223 1.388l.343.189.27.154c.264.152.56.24.863.26l.13.004H20.5a1.5 1.5 0 011.5 1.5V11.5a1.5 1.5 0 01-1.5 1.5h-1.79l-.158.013a1 1 0 00-.723.512l-.064.145-2.987 8.535a1 1 0 01-1.109.656l-1.04-.174a4 4 0 01-3.251-4.783L10 15H5.938a3.664 3.664 0 01-3.576-2.868A3.682 3.682 0 013 9.15l-.02-.088A3.816 3.816 0 014 5.5v-.043l.008-.227a2.86 2.86 0 01.136-.664l.107-.28A3.754 3.754 0 017.705 2h3.605ZM7.705 4c-.755 0-1.425.483-1.663 1.2l-.032.126a.818.818 0 00-.01.131v.872l-.587.586a1.816 1.816 0 00-.524 1.465l.038.23.02.087.21.9-.55.744a1.686 1.686 0 00-.321 1.18l.029.177c.17.76.844 1.302 1.623 1.302H10a2.002 2.002 0 011.956 2.419l-.623 2.904-.034.208a2.002 2.002 0 001.454 2.139l.206.045.21.035 2.708-7.741A3.001 3.001 0 0118.71 11H20V6.002h-1.47c-.696 0-1.38-.183-1.985-.528l-.27-.155-.285-.157A10.002 10.002 0 0011.31 4H7.705Z"></path>
                            </svg>
                        </span>
                        <span data-field="dislikeLabel"></span>
                    </button>
                    <button class="action" type="button" data-action-label>
                        <span class="bubble">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M1 6a4 4 0 014-4h14a4 4 0 014 4v10a4 4 0 01-4 4h-4.8l-5.105 2.836A1.41 1.41 0 017 21.604V20H5a4 4 0 01-4-4V6Zm8 12v2.601l4.229-2.35.453-.251H19a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h4ZM7 8a1 1 0 000 2h10a1 1 0 100-2H7Zm-1 5a1 1 0 001 1h6a1 1 0 000-2H7a1 1 0 00-1 1Z"></path>
                            </svg>
                        </span>
                        <span data-field="commentCount"></span>
                    </button>
                    <button class="action" type="button" data-action-label>
                        <span class="bubble">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M10 3.158V7.51c-5.428.223-8.27 3.75-8.875 11.199-.04.487-.07.975-.09 1.464l-.014.395c-.014.473.578.684.88.32.302-.368.61-.73.925-1.086l.244-.273c1.79-1.967 3-2.677 4.93-2.917a18.011 18.011 0 012-.112v4.346a1 1 0 001.646.763l9.805-8.297 1.55-1.31-1.55-1.31-9.805-8.297A1 1 0 0010 3.158Zm2 6.27v.002-4.116l7.904 6.688L12 18.689v-4.212l-2.023.024c-1.935.022-3.587.17-5.197 1.024a9 9 0 00-1.348.893c.355-1.947.916-3.39 1.63-4.425 1.062-1.541 2.607-2.385 5.02-2.485L12 9.428Z"></path>
                            </svg>
                        </span>
                        <span data-field="shareLabel"></span>
                    </button>
                    <button class="action" type="button" data-action-label>
                        <span class="bubble">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M10.564 1.095a11 11 0 00-9.189 8.058 1 1 0 101.932.517A8.999 8.999 0 0119.481 7H18a1 1 0 100 2h5V4a1 1 0 00-2 0v1.679a11 11 0 00-10.436-4.584ZM12 7a1 1 0 00-1 1v3H8a1 1 0 000 2h3v3a1 1 0 002 0v-3h3a1 1 0 000-2h-3V8a1 1 0 00-1-1Zm8.693 7.33A9 9 0 014.517 17H6a1 1 0 000-2H1v5a1 1 0 102 0v-1.68a11 11 0 0019.625-3.472 1 1 0 10-1.932-.518Z"></path>
                            </svg>
                        </span>
                        <span data-field="remixLabel"></span>
                    </button>

                    <a class="pivot" href="about:invalid#zClosurez" aria-label="이 사운드를 사용하는 동영상 더보기">
                        <img data-field="pivotThumb" src="" alt="">
                    </a>
                </aside>
            </section>
        </section>
    </template>

    <script src="../../static/js/work/workdetail.js" th:src="@{/js/work/workdetail.js}"></script>
</body>
</html>
