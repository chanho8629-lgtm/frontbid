<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Storefront Clone</title>

    <!-- Tailwind CSS CDN (빌드 도구 없이 작동하게 함) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide 아이콘 CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind 테마 및 스타일 설정 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        youtube: {
                            red: '#ff0000',
                            dark: '#0f0f0f',
                            zinc: '#272727',
                        },
                    },
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
        body {
          @apply bg-white dark:bg-[#0f0f0f] text-zinc-900 dark:text-white antialiased;
        }
      }
      @layer utilities {
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      }
      #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .carousel-scroll { scroll-behavior: smooth; }
    </style>
    <link rel="stylesheet" href="../../static/css/layout/layout.css">
</head>

<body class="bg-white dark:bg-[#0f0f0f]">
    <div id="content" class="style-scope ytd-rich-section-renderer">
        <div id="contents-container" class="style-scope ytd-rich-shelf-renderer">
            <div id="contents" class="style-scope ytd-rich-shelf-renderer"
                style="transform: translateX(0px); visibility: visible; width:40%;">
                <div class="style-scope ytd-rich-shelf-renderer" items-per-row="3" lockup="true" is-shelf-item=""
                    is-responsive-grid="COMPACT" half-bottom-margin="">
                    <!--css-build:shady--><!--css_build_scope:ytd-rich-item-renderer--><!--css_build_styles:video.youtube.src.web.polymer.shared.ui.styles.yt_base_styles.yt.base.styles.css.js-->
                    <div id="content" class="style-scope ytd-rich-item-renderer">
                        <div class="ytd-rich-item-renderer lockup yt-lockup-view-model--wrapper">
                            <div
                                class="yt-lockup-view-model yt-lockup-view-model--vertical yt-lockup-view-model--collection-stack-2 content-id-RDCLAK5uy_nMqMWmqwZwDvMcqcAohgO_Dp_7zT1nSC8 yt-lockup-view-model--compact yt-lockup-view-model--rich-grid-legacy-margin yt-lockup-view-model--flex-none">
                                <div aria-hidden="true"
                                    class="yt-spec-touch-feedback-shape yt-spec-touch-feedback-shape--touch-response yt-spec-touch-feedback-shape--thumbnail-size-large yt-spec-touch-feedback-shape--trigger-events"
                                    style="margin: -12px;">
                                    <div class="yt-spec-touch-feedback-shape__stroke"></div>
                                    <div class="yt-spec-touch-feedback-shape__fill"></div>
                                </div><a href="" class="yt-lockup-view-model__content-image" aria-haspopup="false"
                                    tabindex="-1" aria-hidden="true" style="">
                                    <div class="ytCollectionThumbnailViewModelHost" aria-hidden="true">
                                        <div class="ytCollectionsStackHost">
                                            <div>
                                                <div class="ytCollectionsStackCollectionStack2" style="">
                                                </div>
                                                <div class="ytCollectionsStackCollectionStack1 ytCollectionsStackCollectionStack1Large"
                                                    style=""></div>
                                                <div
                                                    class="ytThumbnailViewModelHost ytCollectionThumbnailViewModelHostHasStacks ytThumbnailViewModelAspectRatio1By1 ytThumbnailViewModelLarge">
                                                    <div class="ytThumbnailViewModelImage"><img alt=""
                                                            class="ytCoreImageHost ytCoreImageFillParentHeight ytCoreImageFillParentWidth ytCoreImageContentModeScaleAspectFill ytCoreImageLoaded"
                                                            src="https://i9.ytimg.com/s_p/RDCLAK5uy_nMqMWmqwZwDvMcqcAohgO_Dp_7zT1nSC8/sddefault.jpg?sqp=CNyWss4Gir7X7AMICJaXsc4GEAE=&amp;rs=AOn4CLD2iLdrYExb9Uej4552sE190YsGOQ&amp;v=1774996374">
                                                    </div>
                                                    <div
                                                        class="yt-thumbnail-overlay-badge-view-model yt-thumbnail-overlay-badge-view-model--bottom-end yt-thumbnail-overlay-badge-view-model--large">
                                                        <div
                                                            class="ytThumbnailBadgeViewModelHost yt-thumbnail-overlay-badge-view-model__badge">
                                                            <div
                                                                class="yt-badge-shape yt-badge-shape--thumbnail-default yt-badge-shape--thumbnail-badge yt-badge-shape--typography">
                                                                <div class="yt-badge-shape__icon">
                                                                    <img
                                                                        src="../../static/images/favicon.png"
                                                                        alt=""
                                                                        aria-hidden="true"
                                                                        style="width: 12px; height: 12px; display: block; object-fit: contain;" />
                                                                </div>
                                                                <div class="yt-badge-shape__text">
                                                                    90곡</div>
                                                            </div>
                                                        </div>
                                                    </div><!---->
                                                    <div class="ytThumbnailHoverOverlayViewModelHost ytThumbnailHoverOverlayViewModelHostForceHover"
                                                        style="display: none;">
                                                        <div
                                                            class="ytThumbnailHoverOverlayViewModelScrim ytThumbnailHoverOverlayViewModelStyleCover">
                                                            <span
                                                                class="ytIconWrapperHost ytThumbnailHoverOverlayViewModelIcon"
                                                                role="img" aria-label="" aria-hidden="true"
                                                                style=""><span
                                                                    class="yt-icon-shape ytSpecIconShapeHost">
                                                                    <div
                                                                        style="width: 100%; height: 100%; display: block; fill: currentcolor;">
                                                                        <svg xmlns="http://www.w3.org/2000/svg"
                                                                            height="24" viewBox="0 0 24 24" width="24"
                                                                            focusable="false" aria-hidden="true"
                                                                            style="pointer-events: none; display: inherit; width: 100%; height: 100%;">
                                                                            <path
                                                                                d="M5 4.623V19.38a1.5 1.5 0 002.26 1.29L22 12 7.26 3.33A1.5 1.5 0 005 4.623Z">
                                                                            </path>
                                                                        </svg>
                                                                    </div>
                                                                </span></span><span
                                                                class="yt-core-attributed-string ytThumbnailHoverOverlayViewModelText yt-core-attributed-string--white-space-pre-wrap"
                                                                role="text" style=""><span class="" style="">모두
                                                                    재생</span></span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                                <div class="yt-lockup-view-model__metadata">
                                    <div
                                        class="yt-lockup-metadata-view-model yt-lockup-metadata-view-model--vertical yt-lockup-metadata-view-model--compact yt-lockup-metadata-view-model--typography-bump yt-lockup-metadata-view-model--rich-grid-legacy-typography">
                                        <div class="yt-lockup-metadata-view-model__text-container">
                                            <h3 class="yt-lockup-metadata-view-model__heading-reset" title="BEAT ON"><a
                                                    href="" class="yt-lockup-metadata-view-model__title"
                                                    aria-haspopup="false" style=""><span
                                                        class="yt-core-attributed-string yt-core-attributed-string--white-space-pre-wrap"
                                                        dir="auto" role="text" style="">BEAT ON</span></a>
                                            </h3>
                                            <div class="yt-lockup-metadata-view-model__metadata">
                                                <div
                                                    class="yt-content-metadata-view-model yt-content-metadata-view-model--medium-text">
                                                    <div class="yt-content-metadata-view-model__metadata-row">
                                                        <span
                                                            class="yt-core-attributed-string yt-content-metadata-view-model__metadata-text-max-lines-0 yt-core-attributed-string--white-space-pre-wrap yt-core-attributed-string--link-inherit-color"
                                                            dir="auto" role="text" style="">지금 가장 핫한 국내 댄스 음악을
                                                            감상하세요!</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="yt-lockup-metadata-view-model__menu-button">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                        </div>

                    </div>


                    <div id="interaction" class="extended rounded-large style-scope ytd-rich-item-renderer" hidden="">
                        <!--css-build:shady--><!--css_build_scope:yt-interaction--><!--css_build_styles:video.youtube.src.web.polymer.shared.ui.styles.yt_base_styles.yt.base.styles.css.js,video.youtube.src.web.polymer.shared.ui.yt_interaction.yt.interaction.css.js-->
                        <div class="stroke style-scope yt-interaction"></div>
                        <div class="fill style-scope yt-interaction"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script defer src="../../static/js/main/main.js"></script>
</body>

</html>
